<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Package Features · Xenia Home Build</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/meta.js"></script>
</head>
<body data-page="features">

<div id="nav-placeholder"></div>

<section class="page-hero">
  <div class="container">
    <span class="eyebrow">Gold Package</span>
    <h1>What's Included Standard</h1>
    <p>Every Diyanni home comes with the Gold Package — premium features included in the base price.</p>
  </div>
</section>

<!-- Feature Highlights -->
<section style="padding: 32px 0 64px;">
  <div class="container">
    <div id="highlights" class="grid grid-auto"></div>
  </div>
</section>

<!-- Full PDF view -->
<section class="section" style="background:white;">
  <div class="container">
    <div class="text-center mb-4">
      <span style="font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:600;">Source Document</span>
      <h2 style="font-size:36px;margin-top:8px;color:var(--primary);">Full Gold Package Brochure</h2>
      <p style="color:var(--text-soft);max-width:560px;margin:8px auto;">All pages from the Diyanni Gold Package PDF. Click any image to expand.</p>
    </div>
    <div id="pdfPages" class="grid grid-2"></div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
const highlightIcons = {
  "Structural": "🏗️",
  "Exterior": "🏡",
  "Garage": "🚗",
  "Interior": "🛋️",
  "Kitchen": "🍳",
  "Bathrooms": "🛁",
  "Energy & HVAC": "♨️",
  "Electrical": "💡",
  "Water Protection": "💧",
  "Warranty (Headline)": "⭐",
  "The Diyanni Difference": "🏛️"
};

document.getElementById('highlights').innerHTML = HOME.goldFeatures.highlights.map(h => `
  <div class="card">
    <div style="font-size:28px;margin-bottom:8px;">${highlightIcons[h.category] || '✓'}</div>
    <h3>${h.category}</h3>
    <ul style="list-style:none;padding-left:0;margin-top:12px;">
      ${h.items.map(item => `<li style="font-size:14px;color:var(--text-soft);padding:4px 0;display:flex;gap:8px;"><span style="color:var(--green);">✓</span>${item}</li>`).join('')}
    </ul>
  </div>
`).join('');

document.getElementById('pdfPages').innerHTML = HOME.goldFeatures.pages.map((p, i) => `
  <div class="gallery-item" style="aspect-ratio:8.5/11;">
    <img src="${p}" alt="Gold Package page ${i+1}" loading="lazy">
    <div class="gallery-caption">Page ${i+1}</div>
  </div>
`).join('');

initLightbox();
</script>
</body>
</html>
